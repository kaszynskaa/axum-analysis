<script>
// ─── helpers ─────────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
const viz = document.getElementById('viz');

function mkEl(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function add(parent, tag, attrs = {}, text) {
  const e = mkEl(tag, attrs);
  if (text !== undefined) e.textContent = text;
  parent.appendChild(e);
  return e;
}
function dims() {
  const r = document.getElementById('cv').getBoundingClientRect();
  return { W: Math.max(r.width  || window.innerWidth  - 280, 400),
           H: Math.max(r.height || window.innerHeight - 110, 300) };
}
function detail(title, ref, html) {
  document.getElementById('dt').textContent  = title;
  document.getElementById('dr').textContent  = ref || '';
  document.getElementById('db').innerHTML    = html;
}
function setLabel(t, s) {
  document.getElementById('lbl').innerHTML = `<h2>${t}</h2><p>${s}</p>`;
}
function setLegend(items) {
  document.getElementById('leg').innerHTML = items.map(i =>
    `<div class="li"><div class="dot" style="background:${i.c}"></div>${i.l}</div>`).join('');
}
function setCtrl(buttons) {
  const el = document.getElementById('ctrl');
  el.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'cb ' + (b.p ? 'p' : '');
    btn.textContent = b.lbl;
    btn.onclick = b.fn;
    el.appendChild(btn);
  });
}

// Arrow markers
function ensureDefs() {
  let d = viz.querySelector('defs');
  if (!d) { d = mkEl('defs'); viz.insertBefore(d, viz.firstChild); }
  return d;
}
function mkArrow(id, color) {
  const defs = ensureDefs();
  if (defs.querySelector('#' + id)) return;
  const m = add(defs, 'marker', { id, viewBox:'0 -5 10 10',
    refX:'9', refY:'0', markerWidth:'6', markerHeight:'6', orient:'auto' });
  add(m, 'path', { d:'M0,-5L10,0L0,5', fill: color || '#555' });
}

// Multi-line SVG text helper (centres lines vertically)
function multiText(parent, lines, x, y, size, fill, bold) {
  const lh = size * 1.3;
  const top = y - ((lines.length - 1) / 2) * lh;
  lines.forEach((ln, i) => {
    add(parent, 'text', {
      x, y: top + i * lh,
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': size, fill, 'font-weight': bold ? '700' : '400',
    }, ln);
  });
}

// Selection state
let selectedNode = null;
function selectNode(gEl) {
  if (selectedNode) selectedNode.classList.remove('sel');
  selectedNode = gEl;
  if (gEl) gEl.classList.add('sel');
}

// clear everything
let _raf = null;
function clearScene() {
  if (_raf) { cancelAnimationFrame(_raf); _raf = null; }
  viz.innerHTML = '';
  document.getElementById('ctrl').innerHTML = '';
  selectedNode = null;
  detail('Wybierz węzeł', '', '<p>Kliknij dowolny węzeł, aby poznać szczegóły tego komponentu axum.</p>');
}

// ─── Force simulation ─────────────────────────────────────────────────────────
// Minimal spring-repulsion simulation, no dependencies.
function runSim(nodes, links, W, H, onTick, steps = 200) {
  // resolve link references
  const nm = Object.fromEntries(nodes.map(n => [n.id, n]));
  const resolvedLinks = links.map(l => ({
    ...l,
    src: nm[typeof l.s === 'string' ? l.s : l.s.id] || l.s,
    tgt: nm[typeof l.t === 'string' ? l.t : l.t.id] || l.t,
  })).filter(l => l.src && l.tgt);

  nodes.forEach(n => { n.vx = n.vx||0; n.vy = n.vy||0; });
  let alpha = 1, count = 0;

  function tick() {
    if (count++ > steps || alpha < 0.02) { onTick(nodes); return; }

    // Repulsion between all pairs
    for (let i = 0; i < nodes.length - 1; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = b.x - a.x || 0.1, dy = b.y - a.y || 0.1;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const minD = (a.r||30) + (b.r||30) + 20;
        if (dist < minD * 2.5) {
          const f = Math.min(600, 300 * minD / dist) / dist * alpha;
          if (!a.pinned) { a.vx -= dx*f; a.vy -= dy*f; }
          if (!b.pinned) { b.vx += dx*f; b.vy += dy*f; }
        }
      }
    }

    // Springs on links
    for (const lk of resolvedLinks) {
      const a = lk.src, b = lk.tgt;
      const dx = b.x - a.x || 0.1, dy = b.y - a.y || 0.1;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const target = lk.dist || ((a.r||30) + (b.r||30)) * 3;
      const f = (dist - target) * 0.035 * alpha;
      const fx = dx/dist*f, fy = dy/dist*f;
      if (!a.pinned) { a.vx += fx; a.vy += fy; }
      if (!b.pinned) { b.vx -= fx; b.vy -= fy; }
    }

    // Weak centre gravity
    for (const n of nodes) {
      if (n.pinned) continue;
      n.vx += (W/2 - n.x) * 0.005 * alpha;
      n.vy += (H/2 - n.y) * 0.005 * alpha;
    }

    // Integrate with damping
    for (const n of nodes) {
      if (n.pinned) { n.vx = 0; n.vy = 0; continue; }
      n.vx *= 0.80; n.vy *= 0.80;
      n.x += n.vx; n.y += n.vy;
      // clamp to canvas
      const pad = (n.r||30) + 8;
      n.x = Math.max(pad, Math.min(W - pad, n.x));
      n.y = Math.max(pad, Math.min(H - pad, n.y));
    }

    alpha -= 0.006;
    onTick(nodes);
    _raf = requestAnimationFrame(tick);
  }
  _raf = requestAnimationFrame(tick);
}

const archNodes = [

  {s:'axum-core',  t:'axum',       lbl:'core traits'},

  {s:'hyper',      t:'axum-core',  lbl:''},

const archColor = { i:'#58a6ff', e:'#3fb950', m:'#ffa657' };

function renderArch() {
  clearScene();
  const { W, H } = dims();
  viz.setAttribute('width', W); viz.setAttribute('height', H);
  setLabel('Architektura Crate\'ów', 'Cztery crate\'y i zależności — kliknij węzeł, by zbadać');
  setLegend([
    {c:'#58a6ff', l:'crate workspace axum'},
    {c:'#ffa657', l:'crate proc-macro'},
    {c:'#3fb950', l:'zewnętrzna zależność'},
  ]);
  setCtrl([]);
  mkArrow('a-arch', '#555');

  // Pre-position: workspace in inner ring, external in outer ring
  const intern = archNodes.filter(n => n.t !== 'e');
  const extern = archNodes.filter(n => n.t === 'e');
  const cx = W/2, cy = H/2;
  const ri = Math.min(W, H) * 0.18;
  const ro = Math.min(W, H) * 0.40;

  // axum at center
  const axumN = intern.find(n => n.id === 'axum');
  axumN.x = cx; axumN.y = cy;
  const others = intern.filter(n => n.id !== 'axum');
  others.forEach((n, i) => {
    const a = (i / others.length) * 2 * Math.PI - Math.PI / 2;
    n.x = cx + Math.cos(a) * ri;
    n.y = cy + Math.sin(a) * ri;
  });
  extern.forEach((n, i) => {
    const a = (i / extern.length) * 2 * Math.PI - Math.PI / 6;
    n.x = cx + Math.cos(a) * ro;
    n.y = cy + Math.sin(a) * ro;
  });

  // SVG layers
  const lnG = add(viz, 'g');
  const ndG = add(viz, 'g');

  const nodeMap = Object.fromEntries(archNodes.map(n => [n.id, n]));

  // Draw links (initially at pre-positions)
  const lineEls = archLinks.map(lk => {
    const a = nodeMap[lk.s], b = nodeMap[lk.t];
    return add(lnG, 'line', {
      x1: a.x, y1: a.y, x2: b.x, y2: b.y,
      stroke: '#333', 'stroke-width': '1.2', 'marker-end': 'url(#a-arch)',
    });
  });

  // Draw nodes
  const gEls = {};
  archNodes.forEach(n => {
    const g = add(ndG, 'g', { class: 'nd', transform: `translate(${n.x},${n.y})` });
    gEls[n.id] = g;
    add(g, 'circle', {
      r: n.r, fill: archColor[n.t] + '1a',
      stroke: archColor[n.t], 'stroke-width': '2',
    });
    add(g, 'text', {
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': Math.min(12, n.r * 0.52),
      fill: archColor[n.t], 'font-weight': n.t === 'i' ? '700' : '400',
    }, n.lbl);
    g.addEventListener('click', () => {
      selectNode(g);
      detail(n.lbl, n.file, `<span class="badge">${n.badge}</span><p>${n.desc}</p>`);
    });
    // Drag
    let dragging = false, ox = 0, oy = 0;
    g.addEventListener('mousedown', e => {
      dragging = true; n.pinned = true;
      const svgRect = viz.getBoundingClientRect();
      ox = e.clientX - svgRect.left - n.x;
      oy = e.clientY - svgRect.top  - n.y;
      e.preventDefault();
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const svgRect = viz.getBoundingClientRect();
      n.x = e.clientX - svgRect.left - ox;
      n.y = e.clientY - svgRect.top  - oy;
      updatePositions();
    });
    window.addEventListener('mouseup', () => {
      if (dragging) { dragging = false; n.pinned = false; }
    });
  });

  function updatePositions() {
    archNodes.forEach(n => {
      gEls[n.id].setAttribute('transform', `translate(${n.x},${n.y})`);
    });
    lineEls.forEach((le, i) => {
      const a = nodeMap[archLinks[i].s], b = nodeMap[archLinks[i].t];
      le.setAttribute('x1', a.x); le.setAttribute('y1', a.y);
      le.setAttribute('x2', b.x); le.setAttribute('y2', b.y);
    });
  }

  // Run simulation
  runSim(archNodes, archLinks.map(l => ({s:l.s, t:l.t})), W, H, () => updatePositions());
}

function renderJourney() {
  clearScene();
  const { W, H } = dims();
  viz.setAttribute('width', W); viz.setAttribute('height', H);
  setLabel('Podróż Requestu', 'Wybierz scenariusz do animacji — kliknij węzeł po szczegóły');
  setLegend([
    {c:'#58a6ff', l:'axum internals'},
    {c:'#3fb950', l:'zewnętrzny / twój kod'},
    {c:'#ffa657', l:'middleware / response'},
    {c:'#ffd700', l:'animowany pakiet requestu'},
  ]);
  mkArrow('a-j', '#444');

  const N = jNodes.length;
  const BW = 108, BH = 50;
  const padX = 36;
  const step = (W - padX*2 - BW) / (N - 1);
  const midY = H / 2;

  const pos = jNodes.map((d, i) => ({
    ...d,
    cx: padX + i * step + BW/2,
    cy: midY + (i % 2 === 0 ? -38 : 38),
  }));

  // Connector lines
  const segG = add(viz, 'g');
  for (let i = 0; i < pos.length - 1; i++) {
    const a = pos[i], b = pos[i+1];
    add(segG, 'line', {
      x1: a.cx, y1: a.cy, x2: b.cx, y2: b.cy,
      stroke: '#2d3748', 'stroke-width': '1.5', 'marker-end': 'url(#a-j)',
    });
  }

  // Boxes
  const gEls2 = [];
  pos.forEach(d => {
    const g = add(viz, 'g', { class:'nd', transform:`translate(${d.cx - BW/2},${d.cy - BH/2})` });
    gEls2.push(g);
    add(g, 'rect', {
      width:BW, height:BH, rx:'6',
      fill: d.c + '18', stroke: d.c, 'stroke-width':'1.5',
    });
    const lines = d.lbl.split('\n');
    lines.forEach((ln, i) => {
      add(g, 'text', {
        x: BW/2,
        y: BH/2 + (i - (lines.length-1)/2) * 14,
        'text-anchor':'middle', 'dominant-baseline':'central',
        'font-size':'10.5', fill: d.c,
      }, ln);
    });
    g.addEventListener('click', () => {
      selectNode(g);
      detail(d.lbl.replace('\n',' '), d.file, `<p>${d.desc}</p>`);
    });
  });

  // Animated packet
  const pkt = add(viz, 'circle', {
    r:'8', fill:'#ffd700', opacity:'0',
    style:'filter:drop-shadow(0 0 7px #ffd700)',
  });

  let animating = false;
  function animatePath(ids, color, onEnd) {
    if (animating) return;
    animating = true;
    const pts = ids.map(id => pos.find(p => p.id === id));
    pkt.setAttribute('fill', color);
    pkt.setAttribute('cx', pts[0].cx);
    pkt.setAttribute('cy', pts[0].cy);
    pkt.setAttribute('opacity', '0.95');

    let seg = 0;
    let startTime = null;
    const SPEED = 260; // px per second

    function frame(now) {
      if (!startTime) startTime = now;
      if (seg >= pts.length - 1) {
        pkt.setAttribute('opacity', '0');
        animating = false;
        if (onEnd) onEnd();
        return;
      }
      const a = pts[seg], b = pts[seg+1];
      const dist = Math.hypot(b.cx - a.cx, b.cy - a.cy);
      const dur = dist / SPEED * 1000;
      const t = Math.min(1, (now - startTime) / dur);
      pkt.setAttribute('cx', a.cx + (b.cx - a.cx) * t);
      pkt.setAttribute('cy', a.cy + (b.cy - a.cy) * t);
      if (t >= 1) { seg++; startTime = now; }
      _raf = requestAnimationFrame(frame);
    }
    _raf = requestAnimationFrame(frame);
  }

  const allIds = pos.map(p => p.id);
  setCtrl([
    { lbl:'▶ Happy Path (200)', p:true, fn:() => {
        animatePath(allIds, '#ffd700');
        detail('200 OK — Happy Path','handler → IntoResponse',
          '<p>Wszystkie extractory zwracają Ok. User async fn uruchamia się. Wartość zwrotna konwertowana do HTTP Response przez <code>IntoResponse</code>. Hyper zapisuje bajty do socketu.</p>');
    }},
    { lbl:'▶ 404 Not Found', p:false, fn:() => {
        animatePath(['client','tcp','serve','hyper','mw','router','path'], '#f85149');
        detail('404 Not Found','path_router.rs:342',
          '<p>matchit nie znajduje pasującej trasy. <code>catch_all_fallback.call_with_state(req, ())</code> wywoływany. Domyślnie: prosty 404. Nadpisz przez <code>.fallback(handler)</code>.</p>');
    }},
    { lbl:'▶ 405 Method Not Allowed', p:false, fn:() => {
        animatePath(['client','tcp','serve','hyper','mw','router','path','method'], '#ffa657');
        detail('405 Method Not Allowed','method_routing.rs:1167',
          '<p>Ścieżka dopasowana, ale brak handlera dla tej metody HTTP. MethodRouter zwraca <code>405</code> z nagłówkiem <code>Allow</code> listującym wszystkie zarejestrowane metody dla tej trasy.</p>');
    }},
    { lbl:'▶ Błąd Extractora', p:false, fn:() => {
        animatePath(['client','tcp','serve','hyper','mw','router','path','method','handler','extract'], '#d2a8ff');
        detail('400/415/422 — Extractor Rejection','axum-core/src/extract/mod.rs',
          '<p>Pierwszy nieskuteczny ekstraktor wywołuje <code>rejection.into_response()</code>. User fn nigdy nie jest wywoływany. <code>Path&lt;T&gt;</code> → 400, zły Content-Type dla Json → 415, zły JSON → 422.</p>');
    }},
  ]);
}

function renderTraits() {
  clearScene();
  const { W, H } = dims();
  viz.setAttribute('width', W); viz.setAttribute('height', H);
  setLabel('System Traitów', 'Cztery core traity łączą cały framework — kliknij węzeł, by zbadać');

    {c:'#ffa657', l:'trait (interfejs)'},

    {c:'#79c0ff', l:'impl (ekstraktor)'},
    {c:'#3fb950', l:'impl (response)'},
    {c:'#d2a8ff', l:'impl (handler bridge)'},
  ]);
  setCtrl([]);
  mkArrow('a-t','#555');

  const cols = 12, rows = 3;
  const cw = (W - 80) / cols;
  const rh = (H - 60) / rows;

  const nodes = traitData.map(([id,lbl,t,col,gx,gy,desc,file]) => ({
    id, lbl, t, col, gx, gy, desc, file, r: 54,
    x: 40 + (gx + 4) * cw + cw/2,
    y: 40 + gy * rh + rh/2,
  }));
  const nm = Object.fromEntries(nodes.map(n => [n.id, n]));

  const lnG = add(viz, 'g');
  const ltG = add(viz, 'g');
  const ndG = add(viz, 'g');

  const linkEls3 = traitLinks2.map(([s,t,lbl]) => {
    const a = nm[s], b = nm[t];
    const le = add(lnG, 'line', {
      x1:a.x,y1:a.y,x2:b.x,y2:b.y,
      stroke:'#2d3748','stroke-width':'1.2',
      'stroke-dasharray': lbl.includes('impl') ? '5 3' : 'none',
      'marker-end':'url(#a-t)',
    });
    const te = add(ltG, 'text', {
      x:(a.x+b.x)/2, y:(a.y+b.y)/2 - 5,
      'text-anchor':'middle','font-size':'9','fill':'#444',
    }, lbl);
    return { le, te, s, t: t };
  });

  const gEls3 = {};
  nodes.forEach(n => {
    const g = add(ndG, 'g', { class:'nd', transform:`translate(${n.x},${n.y})` });
    gEls3[n.id] = g;
    add(g, 'ellipse', {
      rx:'54', ry:'21',
      fill: n.col + '18', stroke: n.col, 'stroke-width': n.t==='trait' ? '2.2' : '1.5',
    });
    const lines = n.lbl.split('\n');
    lines.forEach((ln, i) => {
      add(g, 'text', {
        x:'0', y:(i-(lines.length-1)/2)*12.5,

        'font-size':'10', fill:n.col,

      selectNode(g);
      detail(n.lbl.replace('\n',' '), n.file, `<span class="badge">${n.t}</span><p>${n.desc}</p>`);
    });
    // Drag
    let drag=false, ox=0, oy=0;
    g.addEventListener('mousedown',e=>{
      drag=true; n.pinned=true;
      const r=viz.getBoundingClientRect();
      ox=e.clientX-r.left-n.x; oy=e.clientY-r.top-n.y; e.preventDefault();
    });
    window.addEventListener('mousemove',e=>{
      if(!drag)return;
      const r=viz.getBoundingClientRect();
      n.x=e.clientX-r.left-ox; n.y=e.clientY-r.top-oy;
      update3();
    });
    window.addEventListener('mouseup',()=>{if(drag){drag=false;n.pinned=false;}});
  });

  function update3() {
    nodes.forEach(n => gEls3[n.id].setAttribute('transform',`translate(${n.x},${n.y})`));
    traitLinks2.forEach(([s,t], i) => {
      const a=nm[s], b=nm[t], {le,te}=linkEls3[i];
      le.setAttribute('x1',a.x);le.setAttribute('y1',a.y);
      le.setAttribute('x2',b.x);le.setAttribute('y2',b.y);
      te.setAttribute('x',(a.x+b.x)/2);te.setAttribute('y',(a.y+b.y)/2-5);
    });
  }

  const simLinks = traitLinks2.map(([s,t])=>({s,t,dist:110}));
  runSim(nodes, simLinks, W, H, ()=>update3(), 150);
}

function renderErrors() {
  clearScene();
  const { W, H } = dims();
  viz.setAttribute('width', W); viz.setAttribute('height', H);
  setLabel('Ścieżki Błędów', 'Każdy możliwy wynik HTTP — kliknij węzeł po przyczynę');
  setLegend([
    {c:'#58a6ff', l:'request / krok routingu'},
    {c:'#ffa657', l:'punkt decyzyjny'},
    {c:'#3fb950', l:'sukces / kontynuacja'},
    {c:'#f85149', l:'odpowiedź błędu'},
  ]);
  setCtrl([]);
  mkArrow('a-e','#444');

  const BW = 155, BH = 46, GAPY = 76;

  // BFS to assign depth and breadth positions
  function flatTree(node, depth) {
    return [{ ...node, depth }, ...(node.ch||[]).flatMap(c => flatTree(c, depth+1))];
  }
  const flat = flatTree(errTree, 0);
  const byDepth = {};
  flat.forEach(n => { (byDepth[n.depth] = byDepth[n.depth]||[]).push(n); });

  const maxDepth = Math.max(...flat.map(n => n.depth));
  const treeH = (maxDepth + 1) * (BH + GAPY) + 30;
  const scale = Math.min(1, (H - 40) / treeH);

  Object.entries(byDepth).forEach(([depth, nodes]) => {
    const n = nodes.length;
    const startX = W/2 - ((n-1)*(BW+30))/2;
    nodes.forEach((node, i) => {
      node.px = startX + i*(BW+30) + BW/2;
      node.py = 40 + depth * (BH + GAPY) * scale + BH/2;
    });
  });

  const parentOf = n => flat.find(p => p.ch && p.ch.some(c => c.id === n.id));

  flat.filter(n => parentOf(n)).forEach(n => {
    const p = parentOf(n);
    add(viz, 'path', {
      d:`M${p.px},${p.py+BH/2} C${p.px},${p.py+BH/2+26} ${n.px},${n.py-BH/2-26} ${n.px},${n.py-BH/2}`,
      fill:'none', stroke:'#2d3748', 'stroke-width':'1.5', 'marker-end':'url(#a-e)',
    });
  });

  flat.forEach(n => {
    const g = add(viz, 'g', { class:'nd', transform:`translate(${n.px-BW/2},${n.py-BH/2})` });
    add(g, 'rect', { width:BW, height:BH, rx:'7',
      fill:n.c+'18', stroke:n.c, 'stroke-width':'1.8' });
    const lns = n.lbl.split('\n');
    lns.forEach((ln, i) => {
      add(g, 'text', {
        x:BW/2, y:BH/2+(i-(lns.length-1)/2)*13,
        'text-anchor':'middle','dominant-baseline':'central',
        'font-size':'11', fill:n.c, 'font-weight': n.outcome?'700':'400',
      }, ln);
    });
    if (n.outcome) {
      add(g, 'text', { x:BW/2, y:BH+14,
        'text-anchor':'middle','font-size':'10',fill:n.c,'font-weight':'600',
      }, '→ ' + n.outcome);
    }
    g.addEventListener('click',()=>{
      selectNode(g);
      detail(n.lbl.replace('\n',' '), n.outcome||'',
        `<p>${n.desc}</p>` + (n.outcome?`<br><strong style="color:${n.c}">HTTP: ${n.outcome}</strong>`:''));
    });
  });
}
